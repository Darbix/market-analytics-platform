name: General Tests

on: [push, pull_request]

jobs:
  general-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for tests
        run: cp .env.example .env

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry
      
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        run: |
          cd backend
          poetry install

      - name: Run tests
        run: |
          cd backend
          poetry run pytest tests/general_tests -v

  integration-tests:
    needs: general-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for tests
        run: cp .env.example .env

      - name: Start containers
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry
      
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        run: |
          cd backend
          poetry install

      - name: Run integration tests
        run: |
          cd backend
          poetry run pytest tests/integration_tests -v

      - name: Stop containers
        if: always()
        run: |
          echo "----- All container logs -----"
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs
          docker compose -f docker-compose.yml -f docker-compose.test.yml down
